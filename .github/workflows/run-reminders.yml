name: Run reminder dispatcher

# Runs every 5 minutes. The dispatcher itself enforces the 8am-1am active
# hours window in local time, so off-hour runs are cheap no-ops.
#
# NOTE: Public repos get unlimited GitHub Actions minutes. If this repo were
# private, this schedule would blow past the 2000 min/month free quota in
# about a week.
on:
  schedule:
    # Every 5 minutes, but offset to avoid :00 and :30 which are the peak
    # load times on GitHub's shared runners. Per GitHub's own docs:
    # "High load times include the start of every hour. If the load is
    # sufficiently high enough, some queued jobs may be dropped."
    # We fire at :02, :07, :12, :17, :22, :27, :32, :37, :42, :47, :52, :57.
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'
  workflow_dispatch:

jobs:
  run-dispatcher:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Explicit minimum permissions. The job only needs to read the repo;
    # it does not write back to git, push artifacts, or call the GitHub API.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh habit-specific trigger state
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          HABITS_DB_ID: ${{ secrets.HABITS_DB_ID }}
          HABIT_LOG_DB_ID: ${{ secrets.HABIT_LOG_DB_ID }}
        run: python habit_reminder_evaluator.py

      - name: Run dispatcher
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
          REMINDER_TARGET_DB_IDS: ${{ secrets.REMINDER_TARGET_DB_IDS }}
        run: python reminder_dispatcher.py
